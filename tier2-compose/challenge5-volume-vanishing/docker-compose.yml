services:
  db:
    image: postgres:15.6-alpine3.19
    environment:
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=flagdb
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # BUG: Missing named volume for data persistence!
      # Your fix goes here - add a named volume mounted to /var/lib/postgresql/data

  app:
    build: ./app
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://postgres:secret@db:5432/flagdb

# TODO: Define your named volume here
