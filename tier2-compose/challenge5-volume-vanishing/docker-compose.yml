version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=flagdb
    # BUG: No volume! Data disappears on restart!
    ports:
      - "5432:5432"

  app:
    build: ./app
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://postgres:secret@db:5432/flagdb

